<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全球数据资产安全监控</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #06101f;
      --panel: rgba(10, 25, 47, 0.78);
      --panel-2: rgba(12, 31, 58, 0.62);
      --line: rgba(91, 209, 255, 0.24);
      --line-strong: rgba(91, 209, 255, 0.46);
      --text: #dbeafe;
      --muted: #85a3c4;
      --cyan: #38d5ff;
      --blue: #4f8dff;
      --violet: #9b72ff;
      --green: #43e7a5;
      --amber: #ffb84d;
      --red: #ff5f76;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1500px;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(rgba(56, 213, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 213, 255, 0.04) 1px, transparent 1px),
        radial-gradient(circle at 18% 12%, rgba(79, 141, 255, 0.2), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(155, 114, 255, 0.16), transparent 30%),
        linear-gradient(135deg, #040914 0%, var(--bg) 48%, #09172a 100%);
      background-size: 42px 42px, 42px 42px, auto, auto, auto;
      overflow-x: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 22%, rgba(0,0,0,0.2));
      z-index: 0;
    }

    .dashboard {
      position: relative;
      z-index: 1;
      width: min(1920px, max(1500px, 100vw));
      min-width: 1500px;
      margin: 0 auto;
      padding: 14px 18px 20px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      padding: 10px 4px 14px;
      border-bottom: 1px solid rgba(91, 209, 255, 0.18);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 2.5vw, 44px);
      letter-spacing: 0;
      font-weight: 800;
      text-shadow: 0 0 22px rgba(56, 213, 255, 0.26);
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .demo-tag {
      justify-self: end;
      max-width: 470px;
      padding: 9px 13px;
      border: 1px solid rgba(255, 184, 77, 0.42);
      color: #ffd89a;
      background: rgba(255, 184, 77, 0.08);
      font-size: 13px;
      line-height: 1.45;
      border-radius: 6px;
      box-shadow: 0 0 24px rgba(255, 184, 77, 0.08);
    }

    .grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .layer-1 { grid-template-columns: minmax(0, 1.22fr) minmax(350px, 0.9fr) minmax(330px, 0.82fr); }
    .layer-2 { grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.35fr) minmax(340px, 1fr); }
    .layer-3 { grid-template-columns: 1fr; }
    .layer-4 { grid-template-columns: repeat(3, minmax(280px, 1fr)); }

    .panel {
      position: relative;
      min-width: 0;
      background: linear-gradient(180deg, rgba(16, 39, 72, 0.84), var(--panel));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-top: 1px solid rgba(91, 209, 255, 0.18);
      background: linear-gradient(90deg, rgba(56, 213, 255, 0.08), transparent 26%, transparent 74%, rgba(155, 114, 255, 0.06));
    }

    .panel-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px 7px;
      border-bottom: 1px solid rgba(91, 209, 255, 0.13);
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #eef8ff;
    }

    .panel-title::before {
      content: "";
      width: 7px;
      height: 7px;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      transform: rotate(45deg);
    }

    .source {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
      gap: 8px;
      padding: 10px;
    }

    .metric {
      min-height: 66px;
      padding: 9px 10px;
      border: 1px solid rgba(91, 209, 255, 0.16);
      border-radius: 7px;
      background: linear-gradient(145deg, rgba(7, 18, 36, 0.74), rgba(13, 34, 63, 0.62));
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric-value {
      margin-top: 7px;
      font-family: var(--mono);
      font-size: clamp(18px, 1.45vw, 27px);
      font-weight: 800;
      color: #f2fbff;
      white-space: nowrap;
    }

    .metric-foot {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .good { color: var(--green); }
    .watch { color: var(--amber); }
    .risk { color: var(--red); }
    .live { color: var(--cyan); }

    .chart {
      position: relative;
      height: 300px;
      width: 100%;
    }

    #radarChart { height: 230px; }
    #flowChart { height: 305px; }
    #bridgeChart { height: 215px; }
    #riskChart { height: 230px; }

    .layer-2 .panel {
      min-height: 430px;
    }

    .chain-list,
    .transfer-list,
    .alert-list,
    .track-list {
      position: relative;
      padding: 8px 10px 10px;
      display: grid;
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr;
      gap: 8px;
      align-items: center;
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid rgba(91, 209, 255, 0.12);
      border-radius: 6px;
      background: rgba(4, 13, 28, 0.46);
    }

    .row.new-item {
      animation: pushIn 0.75s ease;
      border-color: rgba(56, 213, 255, 0.58);
      background: rgba(56, 213, 255, 0.13);
    }

    .row.compact { grid-template-columns: 1.1fr 1fr 0.8fr; }
    .row.transfer { grid-template-columns: 1.15fr 0.65fr 0.75fr 0.7fr; }
    .row.alert { grid-template-columns: auto 1fr auto; }
    .row.track { grid-template-columns: 1fr 0.9fr 0.65fr; }

    .name {
      font-weight: 700;
      color: #edf8ff;
      min-width: 0;
    }

    .meta,
    .tiny {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .mono { font-family: var(--mono); }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid rgba(91, 209, 255, 0.24);
      background: rgba(56, 213, 255, 0.08);
      color: #bdeeff;
      font-size: 10px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .pill.demo { color: #b9c4d7; border-color: rgba(185, 196, 215, 0.18); background: rgba(185,196,215,0.05); }
    .pill.warn { color: #ffd79a; border-color: rgba(255,184,77,0.35); background: rgba(255,184,77,0.08); }
    .pill.high { color: #ffb1bd; border-color: rgba(255,95,118,0.42); background: rgba(255,95,118,0.08); }
    .pill.ok { color: #a9f6d5; border-color: rgba(67,231,165,0.32); background: rgba(67,231,165,0.07); }

    .module-split {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(420px, 1fr);
      gap: 12px;
      padding: 12px;
    }

    .protocol-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 8px;
      padding: 10px;
    }

    .protocol-card {
      padding: 9px;
      border: 1px solid rgba(91, 209, 255, 0.14);
      border-radius: 7px;
      background: rgba(5, 16, 33, 0.5);
      transition: border-color 0.25s ease, transform 0.25s ease;
    }

    .protocol-card.active {
      border-color: rgba(56, 213, 255, 0.55);
      transform: translateY(-1px);
    }

    .protocol-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .proto-icon {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      margin-right: 7px;
      border: 1px solid rgba(91, 209, 255, 0.28);
      color: var(--cyan);
      border-radius: 4px;
      font-family: var(--mono);
      background: rgba(56, 213, 255, 0.07);
    }

    .proto-stat {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
    }

    .proto-stat div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 7px;
      border-radius: 5px;
      background: rgba(255,255,255,0.03);
    }

    .bridge-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 9px 10px 0;
    }

    .mini {
      padding: 8px;
      border: 1px solid rgba(91, 209, 255, 0.13);
      border-radius: 6px;
      background: rgba(255,255,255,0.03);
    }

    .mini b {
      display: block;
      font-family: var(--mono);
      font-size: 18px;
      margin-top: 5px;
    }

    .layer-4 .panel {
      min-height: 245px;
    }

    .layer-4 .alert-list,
    .layer-4 .track-list {
      min-height: 198px;
      align-content: stretch;
    }

    .ticker {
      margin-top: 14px;
      border: 1px solid rgba(255, 184, 77, 0.25);
      background: rgba(255, 184, 77, 0.07);
      border-radius: 8px;
      overflow: hidden;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
    }

    .ticker-label {
      padding: 12px 14px;
      color: #ffd28b;
      font-weight: 800;
      border-right: 1px solid rgba(255, 184, 77, 0.2);
    }

    .ticker-text {
      min-height: 44px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: var(--mono);
      color: #fff4df;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .ticker-time {
      padding: 0 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .fade-change {
      animation: pulseLine 0.7s ease;
    }

    .refresh-flash {
      animation: refreshGlow 0.9s ease;
    }

    @keyframes pulseLine {
      0% { background-color: rgba(56, 213, 255, 0.12); }
      100% { background-color: rgba(4, 13, 28, 0.46); }
    }

    @keyframes refreshGlow {
      0% { box-shadow: 0 0 0 rgba(56, 213, 255, 0), var(--shadow); }
      35% { box-shadow: 0 0 24px rgba(56, 213, 255, 0.22), var(--shadow); border-color: rgba(91, 209, 255, 0.5); }
      100% { box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04); }
    }

    @keyframes pushIn {
      0% { opacity: 0; transform: translateY(-12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1499px) {
      body {
        min-width: 1500px;
      }

      .dashboard {
        width: 1500px;
        min-width: 1500px;
      }
    }

  </style>
</head>

    async function testEtherscanAvailability() {

      const url = new URL(CONFIG.ETHERSCAN_BASE_URL);

      try {

    function formatAddress(address) {
      if (!address || address.length < 12) return address || "--";
      return address.slice(0, 6) + "..." + address.slice(-4);

    function formatNumber(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return "--";
      return Math.round(num).toLocaleString("en-US");
    }

    function formatUSD(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return "--";
      if (num >= 1e9) return "$" + (num / 1e9).toFixed(1) + "B";
      if (num >= 1e6) return "$" + (num / 1e6).toFixed(1) + "M";
      if (num >= 1e3) return "$" + (num / 1e3).toFixed(1) + "K";
      return "$" + num.toFixed(0);
    }

    function hexToNumber(hex) {
      if (!hex) return null;
      return parseInt(hex, 16);
    }

    function nowText() {
      return new Date().toLocaleString("zh-CN", { hour12: false });
    }

    function jitter(base, spread) {
      return Math.max(0, base + (Math.random() - 0.5) * spread);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function cacheKey(params) {
      const clean = Object.keys(params).sort().map(key => key + "=" + params[key]).join("&");
      return "etherscan_v2:" + clean;
    }

    function readCache(key, allowExpired) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const item = JSON.parse(raw);
        if (!allowExpired && Date.now() - item.time > item.ttl) return null;
        return item.data;
      } catch (error) {
        return null;
      }
    }

    function writeCache(key, data, ttl) {
      try {
        localStorage.setItem(key, JSON.stringify({ time: Date.now(), ttl, data }));
      } catch (error) {
        // Storage can be unavailable in privacy modes; the dashboard still runs on in-memory data.
      }
    }

    class RequestQueue {
      constructor(interval) {
        this.interval = interval;
        this.queue = [];
        this.running = false;
      }

      enqueue(task) {
        return new Promise((resolve, reject) => {
          this.queue.push({ task, resolve, reject });
          this.run();
        });
      }

      async run() {
        if (this.running) return;
        this.running = true;
        while (this.queue.length) {
          const item = this.queue.shift();
          try {
            item.resolve(await item.task());
          } catch (error) {
            item.reject(error);
          }
          await sleep(this.interval);
        }
        this.running = false;
      }
    }

    const requestQueue = new RequestQueue(CONFIG.REQUEST_INTERVAL_MS);

    async function etherscanRequest(params, ttl) {
      const key = cacheKey(params);
      const fresh = readCache(key, false);
      if (fresh) return { data: fresh, source: "cache" };
      if (!apiEnabled()) {
        const stale = readCache(key, true);
        if (stale) return { data: stale, source: "stale-cache" };
        throw new Error("No Etherscan API key configured");
      }
      return requestQueue.enqueue(async () => {
        const url = new URL(CONFIG.ETHERSCAN_BASE_URL);
        Object.entries({ ...params, apikey: CONFIG.ETHERSCAN_API_KEY }).forEach(([keyName, value]) => {
          url.searchParams.set(keyName, value);
        });
        try {
          const response = await fetch(url.toString(), { cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          const json = await response.json();
          if (json.status === "0" && typeof json.result === "string" && /error|invalid|rate/i.test(json.result)) {
            throw new Error(json.result);
          }
          writeCache(key, json, ttl);
          return { data: json, source: "live" };
        } catch (error) {
          const stale = readCache(key, true);
          if (stale) return { data: stale, source: "stale-cache" };
          throw error;
        }
      });
    }

    async function getLatestBlock(chainid) {
      const params = { chainid, module: "proxy", action: "eth_blockNumber" };
      const res = await etherscanRequest(params, cacheTtl.eth_blockNumber);
      return { block: hexToNumber(res.data.result), source: res.source };
    }

      const params = { chainid, module: "proxy", action: "eth_getBlockByNumber", tag: "latest", boolean: "true" };
      const res = await etherscanRequest(params, cacheTtl.eth_getBlockByNumber);
      return { block: res.data.result, source: res.source };
    }

      const params = { chainid, module: "gastracker", action: "gasoracle" };
      const res = await etherscanRequest(params, cacheTtl.gasoracle);
      return { gas: res.data.result, source: res.source };
    }

    async function getEthPrice() {
      const params = { chainid: 1, module: "stats", action: "ethprice" };
      const res = await etherscanRequest(params, cacheTtl.ethprice);
      return { price: res.data.result, source: res.source };
    }

    async function getTokenTransfers(token) {
      const params = {
        chainid: 1,
        module: "account",
        action: "tokentx",
        contractaddress: token.contract,
        page: 1,
        offset: 20,
        sort: "desc"
      };
      const res = await etherscanRequest(params, cacheTtl.tokentx);
      return { transfers: Array.isArray(res.data.result) ? res.data.result : [], source: res.source };
    }

    async function getProtocolLogs(protocol, latestBlock) {
      if (!protocol.address || !latestBlock) throw new Error("Protocol address or latest block unavailable");
      const params = {
        chainid: 1,
        module: "logs",
        action: "getLogs",
        address: protocol.address,
        fromBlock: Math.max(0, latestBlock - 800),
        toBlock: "latest",
        page: 1,
        offset: 20
      };
      const res = await etherscanRequest(params, cacheTtl.getLogs);
      return { count: Array.isArray(res.data.result) ? res.data.result.length : 0, source: res.source };
    }

    function normalizeTransfers(rawGroups) {
      const rows = rawGroups.flatMap(group => group.items.map(tx => {
        const decimals = Number(tx.tokenDecimal || group.decimals || 6);
        const amount = Number(tx.value || 0) / Math.pow(10, decimals);
        return {
          from: tx.from,
          to: tx.to,
          symbol: tx.tokenSymbol || group.symbol,
          amount,
          risk: amount >= 10000000 ? "高危关注" : amount >= 1000000 ? "大额" : "正常",
          time: tx.timeStamp ? timeAgo(Number(tx.timeStamp) * 1000) : "recent"
        };
      }));
      const large = rows.filter(row => row.amount >= 1000000).sort((a, b) => b.amount - a.amount).slice(0, 6);
      return large.length ? large : demoTransfers;
    }

    function timeAgo(ts) {
      const diff = Math.max(1, Math.floor((Date.now() - ts) / 1000));
      if (diff < 60) return diff + "秒前";
      if (diff < 3600) return Math.floor(diff / 60) + "分钟前";
      return Math.floor(diff / 3600) + "小时前";
    }

      const n = Number(gwei);
      if (!Number.isFinite(n)) return "中";
      if (n > 80) return "极高";

      if (n > 12) return "中";
      return "低";

      const txAlerts = [
        { level: largest.amount >= 10000000 ? "高" : "中", text: `检测到大额 ${largest.symbol} 转账：${formatUSD(largest.amount)}` },
        { level: "高", text: "检测到三明治攻击候选行为" },
        { level: "中", text: "Uniswap V3 出现高滑点兑换模式" },
        { level: "中", text: "重点集群部署可疑合约" },
        { level: "高", text: "协议资金流出超过监控阈值" },
        { level: "中", text: "稳定币归集地址出现短时高频转入" },
        { level: "高", text: "疑似攻击资金拆分转入多个新地址" },
        { level: "中", text: "借贷池清算事件密度高于正常区间" }
      ];
      state.alerts = consensus.concat(txAlerts);
      seedFeed("consensus", consensus, 7);
      seedFeed("tx", txAlerts, 7);
      document.getElementById("consensusAlerts").innerHTML = state.feeds.consensus.map(alertRow).join("");
      document.getElementById("txAlerts").innerHTML = state.feeds.tx.map(alertRow).join("");
      renderTicker();
      renderRiskChart();
    }

    function alertRow(item) {
      const klass = item.level === "高" ? "high" : item.level === "中" || item.level === "监控" ? "warn" : "ok";
      return `<div class="row alert ${item.fresh ? "new-item" : ""}"><span class="pill ${klass}">${item.level}</span><span>${item.text}</span><span class="tiny">${item.age || Math.round(jitter(6, 5))}分钟前</span></div>`;
    }

    function renderTracking() {
      seedFeed("tracking", trackingObjects, 6);
      document.getElementById("trackingList").innerHTML = state.feeds.tracking.map(item => `
        <div class="row track ${item.fresh ? "new-item" : ""}">
          <div>
            <div class="name">${translateTracking(item.name)}</div>
            <div class="tiny">${translateTracking(item.type)}：${translateTracking(item.activity)}</div>
          </div>
          <div>
            <span class="pill ${item.risk === "Critical" || item.risk === "High" ? "high" : "warn"}">${translateTracking(item.risk)}</span>
            <div class="tiny">关联地址 ${item.linked} 个</div>
          </div>
          <div class="mono tiny">${translateTracking(item.status)}<br>${item.age || Math.round(jitter(8, 6))}分钟前</div>
        </div>
      `).join("");
    }

    function translateTracking(text) {
      const map = {
        "Exploit Wallet A": "攻击资金钱包",
        "MEV Bot Cluster B": "MEV 机器人集群",
        "Bridge Incident X": "跨链桥事件",
        "Suspicious Deployer C": "可疑部署者",
        "Risk Address Group D": "风险地址组",
        "Exploit Fund": "攻击资金",
        "MEV": "MEV",
        "Bridge": "跨链桥",
        "Contract": "合约",
        "Cluster": "地址集群",
        "transferred 1,240 ETH to mixer": "向 Mixer 转移 1,240 ETH",
        "sandwich candidate activity": "出现三明治攻击候选活动",
        "abnormal outbound bridge flow": "跨链桥异常流出",
        "new contract deployed by watched cluster": "重点集群部署新合约",
        "stablecoin consolidation pattern": "稳定币归集模式",
        "Critical": "严重",
        "High": "高",
        "Medium": "中",
        "Tracking": "追踪中",
        "Watch": "监控",
      };
      return map[text] || text;
    }

    function renderRiskChart() {
      const data = [
        { name: "共识 / 出块", value: 14 },
        { name: "MEV", value: 18 },
        { name: "异常资金流", value: 24 },
        { name: "合约漏洞", value: 16 },
        { name: "跨链异常", value: 19 }
      ].map(item => ({ ...item, value: Math.round(jitter(item.value, 4)) }));
      charts.risk.setOption({
        tooltip: { trigger: "item" },
        legend: { bottom: 0, textStyle: { color: "#85a3c4", fontSize: 10 } },
        series: [{
          type: "pie",
          radius: ["42%", "66%"],
          center: ["50%", "47%"],
          avoidLabelOverlap: true,
          label: { color: "#dbeafe", formatter: "{b}\n{d}%", fontSize: 10 },
          labelLine: { lineStyle: { color: "rgba(219,234,254,0.35)" } },
          data,
          color: ["#38d5ff", "#9b72ff", "#ffb84d", "#4f8dff", "#43e7a5", "#ff5f76"]
        }]
      });
    }

    function renderTicker() {
      const transferItems = (state.transfers.length ? state.transfers : demoTransfers).slice(0, 3).map(tx => ({
        level: tx.risk.includes("高") ? "高" : "中",
        text: `${tx.symbol} ${formatUSD(tx.amount)} 转移：${formatAddress(tx.from)} -> ${formatAddress(tx.to)}`
      }));
      state.ticker = transferItems.concat([
        { level: "高", text: "高滑点兑换路径上检测到 MEV 三明治攻击候选行为" },
        { level: "中", text: "Ethereum -> Arbitrum 跨链流出集中度上升" },
        { level: "高", text: "已知攻击地址活动命中重点集群特征" },
        { level: "中", text: "协议风险模型发现异常流动性撤出模式" }
      ]);
    }

    function pushDashboardItems() {
      const consensusPool = [
        { level: "中", text: "Ethereum 区块 Gas 使用率接近预警阈值" },
        { level: "监控", text: "Polygon 出块间隔出现连续波动" },
        { level: "低", text: "Gnosis 节点响应延迟回落至正常区间" },
        { level: "中", text: "Linea 批量证明提交间隔偏离基线" },
        { level: "监控", text: "Arbitrum 排队交易压力小幅上升" }
      ];
      const txPool = [
        { level: "高", text: "检测到大额稳定币转入高风险地址" },
        { level: "中", text: "Uniswap V3 高滑点路径继续活跃" },
        { level: "高", text: "疑似攻击资金拆分转移到新地址" },
        { level: "中", text: "借贷协议清算事件密度上升" },
        { level: "监控", text: "可疑合约创建频率高于近一小时均值" }
      ];
      const bridgePool = [
        { level: "高", text: "跨链桥流向重点地址的资金增加" },
        { level: "监控", text: "Ethereum -> Base 路径流量短时升高" },
        { level: "中", text: "Bridge Vault 资金集中度继续上升" }
      ];
      const trackingPool = [
        { name: "Exploit Wallet A", type: "Exploit Fund", activity: "transferred 1,240 ETH to mixer", risk: "Critical", linked: 18, status: "Tracking" },
        { name: "MEV Bot Cluster B", type: "MEV", activity: "sandwich candidate activity", risk: "High", linked: 42, status: "Tracking" },
        { name: "Suspicious Deployer C", type: "Contract", activity: "new contract deployed by watched cluster", risk: "Medium", linked: 7, status: "Tracking" }
      ];
      const transfer = (state.transfers.length ? state.transfers : demoTransfers)[Math.floor(Math.random() * (state.transfers.length || demoTransfers.length))];
      pushFeed("consensus", consensusPool[Math.floor(Math.random() * consensusPool.length)], 7);
      pushFeed("tx", txPool[Math.floor(Math.random() * txPool.length)], 7);
      pushFeed("bridge", bridgePool[Math.floor(Math.random() * bridgePool.length)], 3);
      pushFeed("tracking", trackingPool[Math.floor(Math.random() * trackingPool.length)], 6);
      if (transfer) pushFeed("transfer", transfer, 1);
      renderAlerts();
      renderBridge();
      renderTracking();
      renderTransfers();
      flashPanel("consensusAlerts");
      flashPanel("txAlerts");
      flashPanel("trackingList");
    }

    let tickerIndex = 0;
    function startTicker() {
      setInterval(() => {
        const ticker = document.getElementById("tickerText");
        const time = document.getElementById("tickerTime");
        const item = state.ticker[tickerIndex % state.ticker.length] || { level: "监控", text: "本地演示模式运行中" };
        ticker.style.opacity = "0";
        ticker.style.transform = "translateY(6px)";
        setTimeout(() => {
          ticker.textContent = `[${item.level}] ${item.text}`;
          time.textContent = nowText();
          ticker.style.opacity = "1";
          ticker.style.transform = "translateY(0)";
        }, 220);
        tickerIndex += 1;
      }, 4000);
    }

    async function refreshCoreData() {
      let liveHits = 0;
      try {
        const latest = await getLatestBlock(1);
        if (latest.block) {
          state.latestBlock = latest.block;
          if (latest.source === "live") liveHits += 1;
        }
      } catch (error) {
        state.latestBlock = CONFIG.CHAINS[0].baseBlock + Math.round(Date.now() / 12000) % 100000;
      }
      try {
        const detail = await getLatestBlockDetail(1);
        if (detail.block) {
          state.blockDetail = detail.block;
          if (detail.source === "live") liveHits += 1;
        }
      } catch (error) {
        state.blockDetail = null;
      }
      try {
        const gas = await getGasOracle(1);
        if (gas.gas) {
          state.gasOracle = gas.gas;
          if (gas.source === "live") liveHits += 1;
        }
      } catch (error) {
        state.gasOracle = { SafeGasPrice: "9", ProposeGasPrice: jitter(13, 3).toFixed(1), FastGasPrice: "16" };
      }
      try {
        const price = await getEthPrice();
        if (price.price) {
          state.ethPrice = price.price;
          if (price.source === "live") liveHits += 1;
        }
      } catch (error) {
        state.ethPrice = { ethusd: "3420.8" };
      }
      renderRadar();
      renderMetrics();
      renderAlerts();
      flashPanel("metricGrid");
      flashPanel("radarChart");
    }

    async function refreshChains() {
      const rows = [];
      for (const [index, chain] of CONFIG.CHAINS.entries()) {
        let block = chain.baseBlock + Math.round(Date.now() / 12000) % 100000;
        let live = chain.live;
        if (chain.live) {
          try {
            const result = await getLatestBlock(chain.chainid);
            if (result.block) block = result.block;
          } catch (error) {
            live = false;
          }
        }
        const feeValue = chain.chainid === 1 && state.gasOracle ? Number(state.gasOracle.ProposeGasPrice) : jitter(2 + index * 1.7, 3);
        const fee = (Number.isFinite(feeValue) ? feeValue : jitter(12, 3)).toFixed(1) + " gwei";
        rows.push({
          ...chain,
          live,
          block,
          delay: jitter(chain.chainid === 1 ? 12 : 4, 3).toFixed(1) + "s",
          fee,
          status: index === 6 ? "监控" : Number.parseFloat(fee) > 30 ? "拥堵" : index === 2 ? "活跃" : "正常",
          risk: index === 6 ? "跨链监控" : Number.parseFloat(fee) > 30 ? "Gas 监控" : "正常"
        });
      }
      state.chains = rows;
      renderChains();
      flashPanel("chainList");
    }

    async function refreshTransfers() {
      const groups = [];
      for (const token of CONFIG.TOKENS) {
        try {
          const res = await getTokenTransfers(token);
          groups.push({ symbol: token.symbol, decimals: token.decimals, items: res.transfers });
        } catch (error) {
          groups.push({ symbol: token.symbol, decimals: token.decimals, items: [] });
        }
      }
      state.transfers = normalizeTransfers(groups);
      renderFlow();
      renderTransfers();
      renderAlerts();
      flashPanel("flowChart");
    }

    async function refreshProtocols() {
      const latest = state.latestBlock || CONFIG.CHAINS[0].baseBlock;
      const protocols = [];
      for (const protocol of CONFIG.PROTOCOLS) {
        let events = Math.round(jitter(protocol.demoEvents, 5));
        let source = "本地校准";
        if (protocol.live && apiEnabled()) {
          try {
            const res = await getProtocolLogs(protocol, latest);
            events = Math.max(res.count, Math.round(jitter(protocol.demoEvents, 4)));
            source = res.source === "live" ? "实时" : "缓存";
          } catch (error) {
            source = "本地校准";
          }
        }
        protocols.push({
          ...protocol,
          events,
          source,
          netFlow: jitter(protocol.name === "Bridge" ? 82 : 38, 20) * 1000000,
          risk: protocol.name === "Bridge" ? "高" : events > 20 ? "中" : "监控"
        });
      }
      state.protocols = protocols;
      let index = 0;
      renderProtocols(index);
      flashPanel("protocolGrid");
      const timer = setInterval(() => {
        index += 1;
        renderProtocols(index % protocols.length);
        if (index >= protocols.length + 1) clearInterval(timer);
      }, 1000);
    }

    function renderStaticModules() {
      renderRadar();
      renderMetrics();
      renderChains();
      renderFlow();
      renderTransfers();
      renderBridge();
      renderProtocols(0);
      renderAlerts();
      renderTracking();
      renderRiskChart();
    }

    async function startSchedulers() {
      await testEtherscanAvailability();
      refreshCoreData();
      refreshChains();
      refreshTransfers();
      refreshProtocols();
      setInterval(refreshCoreData, CONFIG.REFRESH.blockDetail);
      setInterval(refreshChains, CONFIG.REFRESH.block);
      setInterval(refreshTransfers, CONFIG.REFRESH.tokenTransfers);
      setInterval(refreshProtocols, CONFIG.REFRESH.protocolLogs);
      setInterval(() => {
        renderBridge();
        renderFlow();
        renderRiskChart();
      }, 18000);
      setInterval(pushDashboardItems, 5000);
      setInterval(() => {
        const list = document.querySelectorAll(".transfer-list .row, .alert-list .row");
        list.forEach((node, index) => {
          if (index % 5 === Math.floor(Math.random() * 5)) {
            node.classList.remove("fade-change");
            void node.offsetWidth;
            node.classList.add("fade-change");
          }
        });
      }, 5000);
    }

    document.addEventListener("DOMContentLoaded", () => {
      initCharts();
      renderStaticModules();
      renderTicker();
      startTicker();
      startSchedulers();
    });
  </script>
</body>
</html>
