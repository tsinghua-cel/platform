<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>区块链及数字金融安全测评平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC","Source Han Sans SC",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
  background:#061426;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#f8fafc;
}

/* 16:9 大屏展示：直接铺满屏幕 */
.board{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 16% 18%,rgba(47,125,246,.24),transparent 32%),
    radial-gradient(circle at 86% 22%,rgba(52,211,153,.16),transparent 34%),
    radial-gradient(circle at 50% 112%,rgba(96,165,250,.10),transparent 36%),
    linear-gradient(135deg,#061426 0%,#0a213b 52%,#061426 100%);
  box-shadow:0 28px 100px rgba(0,0,0,.38);
}
.board::before{
  content:"";
  position:absolute;
  left:0;right:0;top:0;
  height:1%;
  background:linear-gradient(90deg,transparent,#60a5fa 18%,#93c5fd 48%,#34d399 82%,transparent);
}
.board::after{
  content:"";
  position:absolute;
  inset:2.4% 2.8%;
  border:1px solid rgba(191,219,254,.20);
  border-radius:24px;
  box-shadow:inset 0 0 70px rgba(96,165,250,.045);
  pointer-events:none;
}
.board-bg{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(191,219,254,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(191,219,254,.035) 1px,transparent 1px);
  background-size:96px 96px;
  opacity:.22;
}

.page{
  position:absolute;
  inset:4.1% 4.4% 3.8%;
  display:grid;
  grid-template-rows:8% 17% 60% 10%;
  gap:1.65%;
  letter-spacing:.01em;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(191,219,254,.18);
  padding-bottom:.7%;
  min-height:0;
}
.lab,.theme{
  font-size:clamp(12px,1.02vw,19px);
  font-weight:600;
  color:#e0efff;
  white-space:nowrap;
}
.lab{display:inline-flex;align-items:center;gap:.55em;text-decoration:none;color:#e0efff;background:rgba(191,219,254,.06);border:1px solid rgba(191,219,254,.16);border-radius:999px;padding:.38em .9em;transition:background .2s,border-color .2s}
.lab:visited{color:#e0efff}
.lab:hover{background:rgba(191,219,254,.11);border-color:rgba(191,219,254,.28)}
.lab::before{
  content:"";
  width:.55em;
  height:.55em;
  border-radius:50%;
  background:#f2c14e;
  box-shadow:0 0 14px rgba(242,193,78,.65);
}
.theme{color:#9ff2d7}

.title{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:0;
}
.title h1{
  font-size:clamp(32px,3.75vw,72px);
  line-height:1.12;
  font-weight:780;
  letter-spacing:.035em;
  color:#f8fafc;
  white-space:nowrap;
  text-shadow:0 18px 70px rgba(0,0,0,.36),0 0 28px rgba(96,165,250,.12);
}
.title p{
  margin-top:.45%;
  font-size:clamp(13px,1.1vw,21px);
  line-height:1.55;
  color:#d1deec;
  white-space:nowrap;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:3.2%;
  min-height:0;
}
.panel{
  min-height:0;
  background:
    radial-gradient(circle at 92% 8%,var(--accentShadow),transparent 28%),
    linear-gradient(180deg,rgba(18,50,82,.94),rgba(10,31,54,.82));
  border:1px solid rgba(191,219,254,.22);
  border-top:7px solid var(--accent);
  border-radius:22px;
  box-shadow:0 24px 72px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.055);
  padding:4.3% 4.8%;
  display:grid;
  grid-template-rows:13% 32% 18% 29%;
  gap:2.6%;
  overflow:hidden;
}
.panel.blue{--accent:#60a5fa;--soft:rgba(96,165,250,.15);--softText:#dbeafe;--accentShadow:rgba(96,165,250,.22)}
.panel.green{--accent:#34d399;--soft:rgba(52,211,153,.14);--softText:#d7faea;--accentShadow:rgba(52,211,153,.20)}
.panel-head{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  min-height:0;
}

.tag{
  font-size:clamp(11px,.92vw,17px);
  font-weight:600;
  color:var(--softText);
  background:rgba(2,6,23,.24);
  border:1px solid rgba(191,219,254,.18);
  border-radius:999px;
  padding:.45em 1em;
  white-space:nowrap;
}
.panel-title{
  display:flex;
  align-items:center;
  gap:4%;
  min-height:0;
}
.mark{
  width:8px;
  height:72%;
  border-radius:99px;
  background:var(--accent);
  flex:0 0 auto;
  box-shadow:0 0 20px var(--accent);
}
.panel-title a{
  display:inline-block;
  text-decoration:none;
  color:#f8fafc;
  border-radius:10px;
  transition:color .2s,text-shadow .2s;
}
.panel-title a:visited{color:#f8fafc}
.panel-title a:hover{color:var(--softText);text-shadow:0 0 18px var(--accentShadow)}
.panel-title h2{
  font-size:clamp(28px,2.9vw,55px);
  line-height:1.18;
  font-weight:760;
  color:#f8fafc;
  letter-spacing:.015em;
}
.desc{
  font-size:clamp(12px,1.02vw,19px);
  line-height:1.7;
  color:#d3dfec;
  display:flex;
  align-items:center;
  min-height:0;
}
.items{
  display:grid;
  grid-template-rows:repeat(3,1fr);
  gap:12%;
  min-height:0;
}
.item{
  display:flex;
  align-items:center;
  gap:.75em;
  background:linear-gradient(90deg,rgba(3,12,24,.36),rgba(15,42,70,.24));
  border:1px solid rgba(191,219,254,.13);
  border-left:5px solid var(--accent);
  border-radius:14px;
  padding:0 1.05em;
  color:#e8f2ff;
  font-size:clamp(13px,1.14vw,21px);
  font-weight:650;
  white-space:nowrap;
  min-height:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
}
.item::before{
  content:"";
  width:.45em;
  height:.45em;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px var(--accent);
  flex:0 0 auto;
}

.footer{
  background:linear-gradient(90deg,rgba(47,125,246,.24),rgba(52,211,153,.18));
  border:1px solid rgba(191,219,254,.22);
  color:#f8fafc;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 2%;
  font-size:clamp(13px,1.14vw,22px);
  font-weight:650;
  white-space:nowrap;
  min-height:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 12px 34px rgba(0,0,0,.16);
}
.footer span{color:#bfdbfe;margin:0 .15em}

@media(max-aspect-ratio:16/9){
  .lab,.theme{font-size:clamp(10px,1.75vh,18px)}
  .title h1{font-size:clamp(28px,6.9vh,74px)}
  .title p{font-size:clamp(11px,2.05vh,22px)}
  .tag{font-size:clamp(9px,1.7vh,17px)}
  .panel-title h2{font-size:clamp(24px,5.35vh,56px)}
  .desc{font-size:clamp(10px,1.9vh,19px)}
  .item{font-size:clamp(11px,2.08vh,21px)}
  .footer{font-size:clamp(11px,2.08vh,22px)}
}
</style>
</head>
<body>
<section class="board">
  <div class="board-bg"></div>
  <div class="page">
    <div class="topbar">
      <a class="lab" href="https://skl-crypto.sdu.edu.cn/index.htm" target="_blank" rel="noopener noreferrer">密码与数字经济安全全国重点实验室</a>
      <div class="theme">面向国家数字经济基础设施安全</div>
    </div>

    <div class="title">
      <h1>区块链及数字金融安全测评平台</h1>
      <p>面向数据资产长期保护与区块链可信运行，构建攻防验证、风险评估与安全治理能力</p>
    </div>

    <main class="main">
      <section class="panel blue">
        <div class="panel-head">
          <div class="tag">数据资产长期安全</div>
        </div>
        <div class="panel-title">
          <div class="mark"></div>
          <a href="./main.html"><h2>后量子<br>数据资产安全</h2></a>
        </div>
        <p class="desc">面向金融、政务和产业数据资产，构建抵御量子计算威胁的长期安全保护能力。</p>
        <div class="items">

          <div class="item">数据资产可信流转</div>
          <div class="item">全流程审计治理</div>
        </div>
      </section>

      <section class="panel green">
        <div class="panel-head">
          <div class="tag">区块链可信运行</div>
        </div>
        <div class="panel-title">
          <div class="mark"></div>
          <a href="./main.html"><h2>区块链安全<br>分析平台</h2></a>
        </div>
        <p class="desc">面向主流区块链平台，开展安全风险分析、攻击验证与协议安全评估。</p>
        <div class="items">
          <div class="item">链上风险分析</div>
          <div class="item">攻击行为验证</div>
          <div class="item">协议安全评估</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      面向<span>数据资产长期保护</span>与<span>区块链可信运行</span>，支撑数字经济关键基础设施安全治理
    </footer>
  </div>
</section>
</body>
</html>
